services:
  timescaledb:
    build: .
    container_name: tmf-timescaledb
    # THE MAGIC FIX: Keeps the container alive forever without running the dashboard
    command: tail -f /dev/null 
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@127.0.0.1:5432/${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

# THIS IS THE MISSING PIECE:
volumes:
  timescale_data: